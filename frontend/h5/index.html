<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>BOX·MAGIC 盲盒</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app">
    <!-- 顶部栏 -->
    <header id="topbar">
      <span class="logo">🎁 BOX·MAGIC</span>
      <span id="pointsDisplay" class="points-badge">💎 0</span>
      <button id="checkinBtn" class="btn-sm" onclick="dailyCheckIn()">📅 签到</button>
    </header>

    <!-- 登录覆盖层 -->
    <div id="loginOverlay" class="overlay">
      <div class="login-card">
        <h1>🎁 BOX·MAGIC</h1>
        <p>盲盒抽奖平台</p>
        <input id="nicknameInput" placeholder="输入昵称（留空随机）" />
        <input id="apiBaseInput" value="http://localhost:18100" placeholder="API地址" />
        <button class="btn-primary" onclick="guestLogin()">🚀 开始抽盒</button>
        <div id="loginStatus" class="status-msg"></div>
      </div>
    </div>

    <!-- 错误/提示 Toast -->
    <div id="toast" class="toast hidden"></div>

    <!-- 导航栏 -->
    <nav id="tabbar">
      <button class="tab active" data-tab="series" onclick="switchTab('series')">🏠 系列</button>
      <button class="tab" data-tab="inventory" onclick="switchTab('inventory')">📦 我的</button>
      <button class="tab" data-tab="exchange" onclick="switchTab('exchange')">🔄 交换</button>
      <button class="tab" data-tab="rank" onclick="switchTab('rank')">🏅 排行</button>
      <button class="tab" data-tab="member" onclick="switchTab('member')">👑 会员</button>
      <button class="tab" data-tab="shop" onclick="switchTab('shop')">🛒 商店</button>
    </nav>

    <!-- ===== 系列列表 Tab ===== -->
    <div id="tab-series" class="tab-content active">
      <div id="seriesList" class="series-grid">
        <div class="loading">加载中...</div>
      </div>
    </div>

    <!-- ===== 系列详情/抽盒 Tab ===== -->
    <div id="tab-detail" class="tab-content">
      <button class="btn-back" onclick="switchTab('series')">← 返回系列</button>
      <div id="detailContent"></div>
    </div>

    <!-- ===== 我的盲盒 Tab ===== -->
    <div id="tab-inventory" class="tab-content">
      <div class="panel-head"><h2>📦 我的收藏</h2></div>
      <div id="inventoryContent" class="prize-grid"><div class="loading">加载中...</div></div>
    </div>

    <!-- ===== 交换市场 Tab ===== -->
    <div id="tab-exchange" class="tab-content">
      <div class="panel-head">
        <h2>🔄 交换市场</h2>
        <button class="btn-sm" onclick="showExchangeForm()">+ 发布</button>
      </div>
      <div id="exchangeContent" class="exchange-list"><div class="loading">加载中...</div></div>
    </div>

    <!-- ===== 排行榜 Tab ===== -->
    <div id="tab-rank" class="tab-content">
      <div class="panel-head"><h2>🏅 收集排行榜</h2></div>
      <div id="rankContent" class="rank-list"><div class="loading">加载中...</div></div>
    </div>

    <!-- ===== 会员 Tab ===== -->
    <div id="tab-member" class="tab-content">
      <div id="memberContent"><div class="loading">加载中...</div></div>
    </div>

    <!-- ===== 🆕 商店 Tab ===== -->
    <div id="tab-shop" class="tab-content">
      <div class="panel-head"><h2>🛒 商店</h2></div>
      <!-- 首充礼包横幅 -->
      <div id="firstRechargeBanner" class="first-recharge-banner hidden" onclick="showFirstRecharge()">
        <span class="fr-icon">🔥</span>
        <span class="fr-text">首充礼包 · 限时双倍积分</span>
        <span class="fr-arrow">▶</span>
      </div>
      <!-- 道具库存 -->
      <div id="userItemsDisplay" class="user-items-bar">
        <span class="item-badge" id="item-hint_card">💡 提示卡: 0</span>
        <span class="item-badge" id="item-see_through">👁️ 透卡: 0</span>
        <span class="item-badge" id="item-ten_draw_ticket">🎟️ 十连券: 0</span>
      </div>
      <div id="shopItems" class="shop-grid"><div class="loading">加载中...</div></div>
    </div>
  </div>

  <!-- 首充礼包弹窗 -->
  <div id="firstRechargeModal" class="modal hidden">
    <div class="modal-bg" onclick="closeFirstRechargeModal()"></div>
    <div class="modal-content modal-lg">
      <h2>🔥 首充礼包</h2>
      <p class="fr-subtitle">每位用户限领一次，首充享双倍积分！</p>
      <div id="firstRechargePacks" class="fr-packs"></div>
      <button class="btn-sm" onclick="closeFirstRechargeModal()">关闭</button>
    </div>
  </div>

  <!-- 开盒动画弹窗 -->
  <div id="openBoxModal" class="modal hidden">
    <div class="modal-bg" onclick="closeModal()"></div>
    <div class="modal-content">
      <div id="boxAnim" class="box-anim">
        <div class="box-shake">🎁</div>
        <div class="box-glow"></div>
      </div>
      <div id="boxResult" class="box-result hidden">
        <div id="resultRarity" class="rarity-badge"></div>
        <div id="resultIcon" class="result-icon">🎉</div>
        <div id="resultName" class="result-name"></div>
        <div id="resultNew" class="result-new hidden">✨ NEW!</div>
        <div id="resultReward" class="result-reward hidden"></div>
        <div class="result-actions">
          <button class="btn-sm" onclick="closeModal()">再来一盒</button>
          <button class="btn-sm" onclick="shareDraw()">📤 炫耀</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 交换发布弹窗 -->
  <div id="exchangeModal" class="modal hidden">
    <div class="modal-bg" onclick="closeExchangeModal()"></div>
    <div class="modal-content modal-sm">
      <h3>发布交换</h3>
      <label>我有（选择重复款）：</label>
      <select id="havePrizeSelect"></select>
      <label>我想要：</label>
      <select id="wantPrizeSelect"></select>
      <button class="btn-primary" onclick="publishExchange()">📤 发布</button>
      <button onclick="closeExchangeModal()">取消</button>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
