<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BOX·MAGIC 管理端</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
<div id="app">
  <header id="topbar">
    <span class="logo">⚙️ BOX·MAGIC 管理后台</span>
    <span id="loginStatus" class="status-badge">未登录</span>
    <button id="logoutBtn" class="btn-small hidden" onclick="adminLogout()">退出登录</button>
  </header>

  <!-- 登录 -->
  <div id="loginPanel" class="panel">
    <h2>🔐 管理员登录</h2>
    <input id="apiBaseInput" value="/api/campaign" placeholder="API地址" />
    <input id="usernameInput" placeholder="用户名" />
    <input id="passwordInput" type="password" placeholder="密码" />
    <button class="btn-primary" onclick="adminLogin()">登录</button>
    <div id="loginMsg" class="msg"></div>
  </div>

  <!-- 管理面板 -->
  <div id="adminPanel" class="hidden">
    <nav id="adminTabs">
      <button class="tab active" onclick="switchTab('overview')">📊 总览</button>
      <button class="tab" onclick="switchTab('campaigns')">📦 活动管理</button>
      <button class="tab" onclick="switchTab('prizes')">🏆 礼品管理</button>
      <button class="tab" onclick="switchTab('pity')">🎲 概率配置</button>
      <button class="tab" onclick="switchTab('delivery')">📮 发奖管理</button>
      <button class="tab" onclick="switchTab('records')">📝 抽奖记录</button>
      <button class="tab" onclick="switchTab('monthcard')">💳 月卡/战令</button>
      <button class="tab" onclick="switchTab('shop')">🛒 商店管理</button>
    </nav>

    <div id="tabContent">
      <!-- 总览 -->
      <div id="tabOverview" class="tab-panel">
        <h2>📊 系统总览</h2>
        <div id="overviewStats" class="stats-grid">加载中...</div>
        <div id="overviewCampaigns"></div>
        <div id="overviewRecent"></div>
      </div>

      <!-- 活动管理 -->
      <div id="tabCampaigns" class="tab-panel hidden">
        <h2>📦 活动管理</h2>
        <button class="btn-primary" onclick="showCreateCampaign()">+ 新建活动</button>
        <div id="campaignList" class="data-list">加载中...</div>
      </div>

      <!-- 礼品管理 -->
      <div id="tabPrizes" class="tab-panel hidden">
        <h2>🏆 礼品管理</h2>
        <div class="filter-bar">
          <select id="prizeCampaignSelect" onchange="loadPrizes()">
            <option value="">-- 选择活动 --</option>
          </select>
          <button class="btn-primary" onclick="showCreatePrize()">+ 新建礼品</button>
        </div>
        <div id="prizeList" class="data-list">请先选择一个活动</div>
      </div>

      <!-- 概率配置 -->
      <div id="tabPity" class="tab-panel hidden">
        <h2>🎲 概率/UP池配置</h2>
        <div class="filter-bar">
          <select id="pityCampaignSelect" onchange="loadPityConfig()">
            <option value="">-- 选择活动 --</option>
          </select>
        </div>
        <div id="pityConfigForm" class="hidden">
          <div class="config-section">
            <h3>📊 保底配置</h3>
            <label>启用保底 <input type="checkbox" id="pityEnabled" /></label>
            <label>软保底次数 <input type="number" id="softPityN" /></label>
            <label>概率递增因子 <input type="number" id="pityFactor" step="0.001" /></label>
            <label>硬保底次数 <input type="number" id="hardPityN" /></label>
            <label>保底目标奖品ID <input type="text" id="targetPrize" /></label>
          </div>
          <div class="config-section">
            <h3>⭐ UP池配置</h3>
            <label>启用UP池 <input type="checkbox" id="upPoolEnabled" /></label>
            <label>UP目标奖品ID <input type="text" id="upPrizeId" /></label>
            <label>概率提升倍数 <input type="number" id="upMultiplier" step="0.5" /></label>
            <label>UP目标等级 <select id="upLevel">
              <option value="rare">稀有(rare)</option>
              <option value="secret">隐藏(secret)</option>
              <option value="limited">限定(limited)</option>
            </select></label>
            <label>开始时间 <input type="datetime-local" id="upStartAt" /></label>
            <label>结束时间 <input type="datetime-local" id="upEndAt" /></label>
          </div>
          <button class="btn-primary" onclick="savePityConfig()">💾 保存配置</button>
          <div id="pityMsg" class="msg"></div>
        </div>
      </div>

      <!-- 发奖管理 -->
      <div id="tabDelivery" class="tab-panel hidden">
        <h2>📮 发奖管理</h2>
        <div id="fulfillmentList" class="data-list">加载中...</div>
      </div>

      <!-- 抽奖记录 -->
      <div id="tabRecords" class="tab-panel hidden">
        <h2>📝 抽奖记录</h2>
        <div id="drawRecordsList" class="data-list">加载中...</div>
      </div>

      <!-- 月卡/战令 -->
      <div id="tabMonthcard" class="tab-panel hidden">
        <h2>💳 月卡/战令统配置</h2>
        <p class="hint">当前使用默认配置。可在代码中调整定价和奖励。</p>
        <div class="config-section">
          <h3>月卡定价</h3>
          <p>周卡: 9.9元 | 月卡: 28元 | 季卡: 68元</p>
        </div>
        <div class="config-section">
          <h3>当前赛季</h3>
          <div id="bpSeasonStatus">加载中...</div>
        </div>
      </div>

      <!-- 🆕 商店管理 -->
      <div id="tabShop" class="tab-panel hidden">
        <h2>🛒 商店管理</h2>
        <div class="config-section">
          <h3>📋 当前商品列表</h3>
          <div id="shopItemList" class="data-list">加载中...</div>
        </div>
        <div class="config-section">
          <h3>🔥 首充礼包</h3>
          <div id="adminFirstRechargeList" class="data-list">加载中...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 创建活动弹窗 -->
  <div id="createCampaignModal" class="modal hidden">
    <div class="modal-content">
      <span class="close" onclick="closeModal('createCampaignModal')">&times;</span>
      <h3>新建活动</h3>
      <input id="newCampaignName" placeholder="活动名称" />
      <input id="newCampaignSlug" placeholder="slug" />
      <input id="newCampaignDailyLimit" type="number" placeholder="每日抽奖上限" value="10" />
      <input id="newCampaignMissWeight" type="number" placeholder="未中奖权重" value="30" />
      <input id="newCampaignSummary" placeholder="活动简介" />
      <button class="btn-primary" onclick="createCampaign()">创建</button>
      <div id="createCampaignMsg" class="msg"></div>
    </div>
  </div>

  <!-- 新建礼品弹窗 -->
  <div id="createPrizeModal" class="modal hidden">
    <div class="modal-content">
      <span class="close" onclick="closeModal('createPrizeModal')">&times;</span>
      <h3>新建礼品</h3>
      <input id="newPrizeName" placeholder="礼品名称" />
      <select id="newPrizeLevel">
        <option value="common">普通(common)</option>
        <option value="rare">稀有多(rare)</option>
        <option value="secret">隐藏(secret)</option>
        <option value="limited">限定(limited)</option>
      </select>
      <input id="newPrizeStock" type="number" placeholder="库存" value="100" />
      <input id="newPrizeWeight" type="number" placeholder="概率权重" value="10" />
      <button class="btn-primary" onclick="createPrize()">创建</button>
      <div id="createPrizeMsg" class="msg"></div>
    </div>
  </div>
</div>

<script src="./app.js"></script>
</body>
</html>
