server {
  listen 80;
  server_name 82.156.54.232 api.succ.online;

  location /campaign-admin/ {
    alias /home/ubuntu/campaign-lottery-platform/frontend/admin/;
    index index.html;
    try_files $uri $uri/ /campaign-admin/index.html;
  }

  location /campaign-h5/ {
    alias /home/ubuntu/campaign-lottery-platform/frontend/h5/;
    index index.html;
    try_files $uri $uri/ /campaign-h5/index.html;
  }

  location /api/campaign/ {
    proxy_pass http://127.0.0.1:18100/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
